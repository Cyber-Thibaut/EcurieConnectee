name: Déploiement OTA Raspberry Pi

# L'action se déclenche à chaque 'git push' sur la branche principale
on:
  push:
    branches: [ "main" ] # (ou "master" selon ce que tu as)
    tags:
      - 'v*'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    # CRITIQUE : Donne les droits au robot GitHub de faire un commit !
    permissions:
      contents: write 

    steps:
    - name: 1. Récupérer le code source
      uses: actions/checkout@v4

    - name: 🛠️ 2. Compiler pour Raspberry Pi (Émulation ARM64)
      uses: uraimo/run-on-arch-action@v2
      with:
        arch: armv7
        distro: buster
        
        # On met TOUTES les commandes dans le "run" (à l'intérieur de la Raspberry virtuelle)
        run: |
          # --- PARTIE 0 : INSTALLATION DES OUTILS ---
          export DEBIAN_FRONTEND=noninteractive
          echo "📥 Installation des dépendances système..."
          apt-get update -y
          apt-get install -y build-essential qtbase5-dev qtbase5-private-dev qtbase5-dev-tools qt5-qmake qtdeclarative5-dev libqt5charts5-dev git

          # --- PARTIE A : FABRICATION DE MQTT ---
          echo "🛠️ Téléchargement et compilation du module MQTT..."
          git clone https://github.com/qt/qtmqtt.git
          cd qtmqtt
          git checkout 5.11
          /usr/lib/qt5/bin/qmake
          make
          make install
          cd ..
          
          # --- PARTIE B : COMPILATION DE TON PROJET ---
          echo "🚀 Lancement de qmake pour EcurieActive..."
          /usr/lib/qt5/bin/qmake
          
          echo "Lancement de make..."
          make

    - name: 3. Préparer la mise à jour (OTA)
      run: |
        echo "Création du dossier de release..."
        mkdir -p release
        # On déplace l'exécutable généré dans le dossier release
        cp EcurieActiveNabou release/
        
        # On génère un numéro de version automatique basé sur la date (ex: 2026.04.24-1030)
        date +"%Y.%m.%d-%H%M" > release/version.txt
        
        echo "Version générée :"
        cat release/version.txt

    - name: 🚀 4. Créer une Release GitHub
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ github.ref_name }}
        name: Version Officielle ${{ github.ref_name }}
        files: release/EcurieActiveNabou
        body: |
          🐴 Mise à jour EcurieActive - Version ${{ github.ref_name }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}