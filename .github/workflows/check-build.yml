name: CI - Verification de Compilation

on:
  push:
    branches: [ "main" ]

jobs:
  continuous-integration:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      - name: Checkout du code source
        uses: actions/checkout@v4

      - name: Compilation croisee ARMv7 (Debian Buster)
        uses: uraimo/run-on-arch-action@v2
        with:
          arch: armv7
          distro: buster
          run: |
            export DEBIAN_FRONTEND=noninteractive
            
            # Configuration des depots d'archive (End-of-Life support)
            echo "deb http://archive.debian.org/debian buster main" > /etc/apt/sources.list
            echo "deb http://archive.debian.org/debian-security buster/updates main" >> /etc/apt/sources.list
            
            # Mise a jour et installation des dependances systeme
            apt-get -o Acquire::Check-Valid-Until=false update -y
            apt-get install -y --allow-unauthenticated \
              build-essential \
              qtbase5-dev \
              qtbase5-private-dev \
              qtbase5-dev-tools \
              qt5-qmake \
              qtdeclarative5-dev \
              libqt5charts5-dev \
              git

            # Compilation du module QtMQTT (Branche 5.11 pour compatibilité Buster)
            git clone https://github.com/qt/qtmqtt.git
            cd qtmqtt
            git checkout 5.11
            /usr/lib/qt5/bin/qmake
            make
            make install
            cd ..

            # Compilation du projet principal
            /usr/lib/qt5/bin/qmake
            make

            # 3. EXTRACTION DES FICHIERS
            echo "Extraction de la bibliotheque MQTT pour la Release..."
            # On utilise -P pour bien copier les liens symboliques tels quels
            cp -P qtmqtt/lib/libQt5Mqtt.so.5* .
            
            # On verifie ce qu'on a extrait pour le log GitHub
            ls -lh libQt5Mqtt.so.5*

      - name: Archivage du binaire de test
        uses: actions/upload-artifact@v4
        with:
          name: EcurieActive-Build-Test
          path: |
            EcurieActiveNabou
            libQt5Mqtt.so.5*
          retention-days: 5